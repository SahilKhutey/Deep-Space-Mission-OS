[pytest]
testpaths = tests
python_files = test_*.py
python_classes = Test*
python_functions = test_*
addopts = -v --tb=short
markers =
    unit: Unit tests
    integration: Integration tests
    math: Mathematical verification
    physics: Physics verification
    numerical: Numerical methods
    astrodynamics: Astrodynamics validation
    mission: Mission validation
    propulsion: Propulsion validation
    digital_twin: Digital twin validation
    simulation: Simulation validation
    dashboard: Dashboard testing
    export: Export testing
    performance: Performance testing
    security: Security testing
    regression: Regression testing
    benchmark: Benchmark validation
    acceptance: Acceptance tests
    slow: Slow tests (seconds)
    very_slow: Very slow tests (minutes)
    sdk: SDK testing
    cli: CLI testing
    dataset: Dataset validation
